name: Deploy to GitHub Pages

# Builds the Vite app and deploys the compiled output to GitHub Pages —
# GitHub Pages itself only serves static files as-is, so this workflow is
# what actually runs `npm install` + `npm run build` on GitHub's own
# servers and publishes the result. Nothing needs to build locally.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # The project lives in a "signal-clinic" subfolder of this repo, not
    # the repo root — every shell step below runs from there.
    defaults:
      run:
        working-directory: signal-clinic
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: signal-clinic/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
